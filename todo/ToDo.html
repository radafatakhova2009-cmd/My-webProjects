<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>To_Do</title>
        <link rel="stylesheet" href="StyleToDo.css">
    </head>
    <body>
        <div class="container">
            <h1>Список задач/To do list</h1>
            <form id="task-form">
                <input type="text" id="task-input" placeholder="Напишите задачу/Write task">
                <button type="submit">Добавить задачу/Add task</button>
            </form>
            <ul id="task-list"></ul>
            <script src="Java.js"></script>
        </div>
    </body>
</html>
